<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117"/>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="18" font-weight="bold">OpenBridgeServer (OBS)</text>
  <text x="400" y="70" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="12">Multiprotokoll · Open Source · MIT Lizenz</text>
  <!-- Central OBS core -->
  <rect x="300" y="150" width="200" height="100" rx="12" fill="#1f2937" stroke="#58a6ff" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#58a6ff" font-family="sans-serif" font-size="16" font-weight="bold">OBS Core</text>
  <text x="400" y="212" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Dispatcher + Objektmodell</text>
  <text x="400" y="230" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">MQTT Broker</text>
  <!-- Adapters (left side) -->
  <rect x="40" y="90" width="120" height="35" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="112" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="12">KNX</text>
  <rect x="40" y="135" width="120" height="35" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="157" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="12">Modbus TCP</text>
  <rect x="40" y="180" width="120" height="35" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="202" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="12">SNMP</text>
  <rect x="40" y="225" width="120" height="35" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="247" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="12">MQTT</text>
  <!-- Adapters (right side) -->
  <rect x="640" y="90" width="120" height="35" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="700" y="112" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="12">Home Assistant</text>
  <rect x="640" y="135" width="120" height="35" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="700" y="157" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="12">ioBroker</text>
  <rect x="640" y="180" width="120" height="35" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="700" y="202" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="12">Visualisierung</text>
  <rect x="640" y="225" width="120" height="35" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="700" y="247" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="12">Logikmodul</text>
  <!-- Connection lines -->
  <line x1="160" y1="107" x2="300" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <line x1="160" y1="152" x2="300" y2="185" stroke="#30363d" stroke-width="1.5"/>
  <line x1="160" y1="197" x2="300" y2="200" stroke="#30363d" stroke-width="1.5"/>
  <line x1="160" y1="242" x2="300" y2="215" stroke="#30363d" stroke-width="1.5"/>
  <line x1="500" y1="170" x2="640" y2="107" stroke="#30363d" stroke-width="1.5"/>
  <line x1="500" y1="185" x2="640" y2="152" stroke="#30363d" stroke-width="1.5"/>
  <line x1="500" y1="200" x2="640" y2="197" stroke="#30363d" stroke-width="1.5"/>
  <line x1="500" y1="215" x2="640" y2="242" stroke="#30363d" stroke-width="1.5"/>
  <!-- Footer -->
  <text x="400" y="350" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="11">Ein Plan B wird zum Community-Projekt · 6 Entwickler in 3 Monaten</text>
</svg>