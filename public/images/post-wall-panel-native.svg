<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Tablet side (left) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#1c2128" stroke="#f78166" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="14" font-weight="bold">Tablet + Browser</text>
    <text x="100" y="55" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Lovelace · Kiosk App</text>
    <!-- Heat indicator -->
    <circle cx="100" cy="90" r="25" fill="none" stroke="#f78166" stroke-width="2" opacity="0.6"/>
    <text x="100" y="95" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="14" font-weight="bold">warm</text>
    <text x="100" y="125" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="10">OS Updates brechen</text>
  </g>

  <!-- VS divider -->
  <text x="400" y="160" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="16" font-weight="bold">vs.</text>

  <!-- Native panel side (right) -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="14" font-weight="bold">Natives Panel</text>
    <text x="100" y="55" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">GPU · 5" Industrie</text>
    <!-- Cool indicator -->
    <circle cx="100" cy="90" r="25" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.6"/>
    <text x="100" y="95" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="14" font-weight="bold">kühl</text>
    <text x="100" y="125" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="10">Direkt am KNX-Bus</text>
  </g>

  <!-- Protocol list (bottom) -->
  <g transform="translate(160, 250)">
    <rect x="0" y="0" width="90" height="28" rx="4" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
    <text x="45" y="18" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="11" font-weight="bold">KNX IP</text>
    <rect x="100" y="0" width="70" height="28" rx="4" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="135" y="18" text-anchor="middle" fill="#58a6ff" font-family="sans-serif" font-size="11" font-weight="bold">MQTT</text>
    <rect x="180" y="0" width="70" height="28" rx="4" fill="#1c2128" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="215" y="18" text-anchor="middle" fill="#bc8cff" font-family="sans-serif" font-size="11" font-weight="bold">Modbus</text>
    <rect x="260" y="0" width="60" height="28" rx="4" fill="#1c2128" stroke="#f0883e" stroke-width="1.5"/>
    <text x="290" y="18" text-anchor="middle" fill="#f0883e" font-family="sans-serif" font-size="11" font-weight="bold">SIP</text>
    <rect x="330" y="0" width="75" height="28" rx="4" fill="#1c2128" stroke="#f778ba" stroke-width="1.5"/>
    <text x="367" y="18" text-anchor="middle" fill="#f778ba" font-family="sans-serif" font-size="11" font-weight="bold">BACnet</text>
    <rect x="415" y="0" width="80" height="28" rx="4" fill="#1c2128" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="455" y="18" text-anchor="middle" fill="#79c0ff" font-family="sans-serif" font-size="11" font-weight="bold">OPC-UA</text>
    <rect x="505" y="0" width="60" height="28" rx="4" fill="#1c2128" stroke="#d2a8ff" stroke-width="1.5"/>
    <text x="535" y="18" text-anchor="middle" fill="#d2a8ff" font-family="sans-serif" font-size="11" font-weight="bold">RTSP</text>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="18" font-weight="bold">Wall-Panels: Tablet vs. Natives Panel mit KNX IP</text>

  <!-- Footer -->
  <text x="400" y="370" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="11">Tablet + Browser · Lovelace · UP-Dose Wärmeproblem · Native GPU · KNX IP direkt</text>
</svg>