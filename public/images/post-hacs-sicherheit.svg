<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Home Assistant Hub mit Custom-Integration als gefährdetem Knoten, Sperre-Symbol über HACS-Repository">
  <rect width="800" height="420" fill="#0B120F"/>

  <!-- HA hub center -->
  <g stroke="#24352C" stroke-width="2.5" fill="none">
    <rect x="320" y="150" width="160" height="120" rx="12"/>
    <circle cx="400" cy="210" r="28" stroke="#B7FF5C" stroke-width="2"/>
    <text x="400" y="216" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#B7FF5C" text-anchor="middle">HA</text>
  </g>

  <!-- benign integration nodes -->
  <circle cx="180" cy="120" r="9" fill="#0B120F" stroke="#7FBF3D" stroke-width="2.5"/>
  <circle cx="180" cy="300" r="9" fill="#0B120F" stroke="#7FBF3D" stroke-width="2.5"/>
  <circle cx="620" cy="300" r="9" fill="#0B120F" stroke="#7FBF3D" stroke-width="2.5"/>

  <!-- suspicious node (top right) with link lines -->
  <circle cx="620" cy="120" r="11" fill="#0B120F" stroke="#FF7A50" stroke-width="2.5"/>
  <path d="M620,120 L620,96" stroke="#FF7A50" stroke-width="2"/>
  <path d="M612,96 L628,96 M620,88 L620,104" stroke="#FF7A50" stroke-width="2"/>
  <!-- lock icon above suspicious node -->
  <g stroke="#FF7A50" stroke-width="2" fill="none">
    <rect x="608" y="60" width="24" height="18" rx="3"/>
    <path d="M612,60 V54 a8 8 0 0 1 16 0 V60"/>
  </g>

  <!-- connection lines -->
  <g stroke="#24352C" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="189" y1="120" x2="320" y2="180"/>
    <line x1="189" y1="300" x2="320" y2="240"/>
    <line x1="609" y1="120" x2="480" y2="180"/>
    <line x1="609" y1="300" x2="480" y2="240"/>
  </g>

  <!-- eyebrow text -->
  <text x="40" y="40" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#7FBF3D" letter-spacing="2">1/3/3 — SICHERHEIT</text>
  <!-- title -->
  <text x="40" y="380" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="bold" fill="#E8F0E5">HACS Supply-Chain-Risiko</text>
  <text x="40" y="406" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#8A9B8A">HomeIQ · Smart Home &amp; KNX</text>
</svg>