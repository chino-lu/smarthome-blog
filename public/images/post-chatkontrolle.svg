<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Smartphone mit verschluesselten Nachrichtendiagrammen und Vorhaengeschloss">
  <rect width="800" height="420" fill="#0B120F"/>

  <!-- subtle background glow -->
  <circle cx="400" cy="210" r="200" fill="#B7FF5C" opacity="0.03"/>
  <circle cx="400" cy="210" r="140" fill="#FF7A50" opacity="0.03"/>

  <!-- phone outline -->
  <g stroke="#24352C" stroke-width="2.5" fill="none">
    <rect x="330" y="70" width="140" height="280" rx="16"/>
    <line x1="330" y1="105" x2="470" y2="105"/>
    <line x1="330" y1="320" x2="470" y2="320"/>
  </g>

  <!-- speaker -->
  <rect x="385" y="82" width="30" height="4" rx="2" fill="#24352C"/>

  <!-- lock icon (center) -->
  <g stroke="#B7FF5C" stroke-width="3" fill="none">
    <path d="M380,175 L380,155 C380,140 390,130 400,130 C410,130 420,140 420,155 L420,175"/>
    <rect x="372" y="175" width="56" height="44" rx="6" fill="#0B120F"/>
  </g>
  <circle cx="400" cy="195" r="5" fill="#B7FF5C"/>
  <rect x="398" y="198" width="4" height="12" fill="#B7FF5C"/>

  <!-- chat bubbles (encrypted, green) -->
  <g fill="#17231D" stroke="#B7FF5C" stroke-width="1.5" opacity="0.8">
    <rect x="345" y="235" width="70" height="20" rx="6"/>
    <rect x="385" y="265" width="70" height="20" rx="6"/>
  </g>
  <text x="380" y="249" font-family="JetBrains Mono, monospace" font-size="8" fill="#B7FF5C" text-anchor="middle">••••••</text>
  <text x="420" y="279" font-family="JetBrains Mono, monospace" font-size="8" fill="#B7FF5C" text-anchor="middle">••••••</text>

  <!-- scanning wave from outside (orange, blocked) -->
  <g stroke="#FF7A50" stroke-width="2" fill="none" opacity="0.4">
    <path d="M250,210 Q290,180 320,210" stroke-dasharray="4 3"/>
    <path d="M260,210 Q300,175 330,210" stroke-dasharray="4 3" opacity="0.6"/>
    <path d="M270,210 Q310,170 340,210" stroke-dasharray="4 3" opacity="0.3"/>
  </g>

  <!-- blocked sign -->
  <g stroke="#FF7A50" stroke-width="2.5" fill="none">
    <circle cx="280" cy="210" r="20" fill="#0B120F"/>
    <line x1="266" y1="196" x2="294" y2="224"/>
  </g>

  <!-- labels -->
  <text x="280" y="255" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF7A50" text-anchor="middle" opacity="0.8">SCAN</text>
  <text x="400" y="295" font-family="JetBrains Mono, monospace" font-size="9" fill="#93A399" text-anchor="middle">E2EE</text>

  <!-- address eyebrow -->
  <text x="60" y="50" font-family="JetBrains Mono, monospace" font-size="12" fill="#7FBF3D" opacity="0.7">§ 3/0/0</text>

  <!-- title -->
  <text x="60" y="380" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="600" fill="#F2F4EF">Chatkontrolle</text>
  <text x="60" y="402" font-family="JetBrains Mono, monospace" font-size="11" fill="#64766B">Welche Messenger (noch) sicher sind</text>
</svg>