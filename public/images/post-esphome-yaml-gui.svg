<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117"/>
  <!-- Split line -->
  <line x1="400" y1="80" x2="400" y2="320" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Left side: YAML -->
  <rect x="60" y="100" width="280" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="200" y="135" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">esphome: esp32.yaml</text>
  <text x="80" y="165" fill="#3fb950" font-family="monospace" font-size="12">esp32:</text>
  <text x="100" y="185" fill="#c9d1d9" font-family="monospace" font-size="12">board: esp32dev</text>
  <text x="80" y="215" fill="#3fb950" font-family="monospace" font-size="12">sensor:</text>
  <text x="100" y="235" fill="#c9d1d9" font-family="monospace" font-size="12">- platform: bme280</text>
  <text x="120" y="255" fill="#c9d1d9" font-family="monospace" font-size="12">address: 0x76</text>
  <text x="100" y="280" fill="#f78166" font-family="monospace" font-size="11"># yaml-first</text>
  <!-- Right side: GUI -->
  <rect x="460" y="100" width="280" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="135" text-anchor="middle" fill="#58a6ff" font-family="sans-serif" font-size="13" font-weight="bold">Device Builder</text>
  <rect x="480" y="155" width="240" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="173" fill="#8b949e" font-family="sans-serif" font-size="11">Component: BME280 ▾</text>
  <rect x="480" y="195" width="240" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="213" fill="#8b949e" font-family="sans-serif" font-size="11">I2C Address: 0x76</text>
  <rect x="480" y="235" width="180" height="28" rx="4" fill="#238636" stroke="#238636" stroke-width="1"/>
  <text x="570" y="253" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">Add</text>
  <text x="600" y="285" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="11">gui-first</text>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="18" font-weight="bold">ESPHome: YAML vs GUI</text>
  <!-- Bottom -->
  <text x="200" y="345" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="12">Power-User</text>
  <text x="600" y="345" text-anchor="middle" fill="#58a6ff" font-family="sans-serif" font-size="12">Einsteiger</text>
  <text x="400" y="375" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="11">Ein Kulturkampf in der Community</text>
</svg>