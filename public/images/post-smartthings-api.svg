<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Cloud with lock and dollar sign -->
  <g transform="translate(560, 130)">
    <ellipse cx="0" cy="30" rx="80" ry="45" fill="#1c2128" stroke="#f78166" stroke-width="2"/>
    <ellipse cx="-30" cy="10" rx="35" ry="25" fill="#1c2128" stroke="#f78166" stroke-width="2"/>
    <ellipse cx="25" cy="5" rx="40" ry="28" fill="#1c2128" stroke="#f78166" stroke-width="2"/>
    <!-- Dollar sign -->
    <text x="0" y="40" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="36" font-weight="bold">$5/mo</text>
    <!-- Lock -->
    <rect x="-12" y="-25" width="24" height="18" rx="3" fill="#f78166"/>
    <path d="M -8 -25 L -8 -32 Q -8 -38 0 -38 Q 8 -38 8 -32 L 8 -25" stroke="#f78166" stroke-width="2" fill="none"/>
  </g>

  <!-- Local devices: KNX / Zigbee / ESPHome -->
  <g transform="translate(120, 130)">
    <!-- KNX node -->
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
    <text x="60" y="25" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="14" font-weight="bold">KNX Bus</text>
    <!-- Zigbee node -->
    <rect x="0" y="55" width="120" height="40" rx="4" fill="#1c2128" stroke="#58a6ff" stroke-width="2"/>
    <text x="60" y="80" text-anchor="middle" fill="#58a6ff" font-family="sans-serif" font-size="14" font-weight="bold">Zigbee Mesh</text>
    <!-- ESPHome node -->
    <rect x="0" y="110" width="120" height="40" rx="4" fill="#1c2128" stroke="#bc8cff" stroke-width="2"/>
    <text x="60" y="135" text-anchor="middle" fill="#bc8cff" font-family="sans-serif" font-size="14" font-weight="bold">ESPHome</text>
  </g>

  <!-- Arrow from cloud to local (blocked) -->
  <line x1="430" y1="170" x2="250" y2="170" stroke="#484f58" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="340" y="160" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="11">Paywall</text>
  <!-- X mark on arrow -->
  <text x="340" y="180" text-anchor="middle" fill="#f78166" font-family="sans-serif" font-size="20" font-weight="bold">✕</text>

  <!-- Arrow from local to devices (free) -->
  <line x1="250" y1="190" x2="430" y2="190" stroke="#3fb950" stroke-width="2"/>
  <text x="340" y="215" text-anchor="middle" fill="#3fb950" font-family="sans-serif" font-size="11">lokal · kostenlos · kein Lock-in</text>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c9d1d9" font-family="sans-serif" font-size="18" font-weight="bold">SmartThings API: Paywall vs. lokale Kontrolle</text>

  <!-- Footer -->
  <text x="400" y="370" text-anchor="middle" fill="#484f58" font-family="sans-serif" font-size="11">Cloud-Abhängigkeit vs. KNX · Zigbee · ESPHome</text>
</svg>