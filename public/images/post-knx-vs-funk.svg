<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vergleich einer geordneten Bus-Topologie mit einem verstreuten Funknetz">
  <rect width="800" height="420" fill="#0B120F"/>
  <line x1="400" y1="40" x2="400" y2="380" stroke="#1c2b22" stroke-width="1"/>

  <!-- LEFT: KNX bus — clean straight line, evenly spaced nodes -->
  <g>
    <line x1="80" y1="210" x2="340" y2="210" stroke="#B7FF5C" stroke-width="3.5"/>
    <circle cx="110" cy="210" r="7" fill="#0B120F" stroke="#B7FF5C" stroke-width="3"/>
    <circle cx="180" cy="210" r="7" fill="#0B120F" stroke="#B7FF5C" stroke-width="3"/>
    <circle cx="250" cy="210" r="7" fill="#0B120F" stroke="#B7FF5C" stroke-width="3"/>
    <circle cx="320" cy="210" r="7" fill="#0B120F" stroke="#B7FF5C" stroke-width="3"/>
    <!-- drops to devices -->
    <line x1="110" y1="210" x2="110" y2="160" stroke="#7FBF3D" stroke-width="2"/>
    <line x1="180" y1="210" x2="180" y2="260" stroke="#7FBF3D" stroke-width="2"/>
    <line x1="250" y1="210" x2="250" y2="160" stroke="#7FBF3D" stroke-width="2"/>
    <line x1="320" y1="210" x2="320" y2="260" stroke="#7FBF3D" stroke-width="2"/>
    <rect x="98" y="140" width="24" height="18" rx="3" fill="none" stroke="#B7FF5C" stroke-width="2"/>
    <rect x="168" y="262" width="24" height="18" rx="3" fill="none" stroke="#B7FF5C" stroke-width="2"/>
    <rect x="238" y="140" width="24" height="18" rx="3" fill="none" stroke="#B7FF5C" stroke-width="2"/>
    <rect x="308" y="262" width="24" height="18" rx="3" fill="none" stroke="#B7FF5C" stroke-width="2"/>
  </g>

  <!-- RIGHT: wireless mesh — scattered nodes, dotted signal rings -->
  <g>
    <circle cx="500" cy="150" r="6" fill="#FF7A50"/>
    <circle cx="600" cy="120" r="6" fill="#FF7A50"/>
    <circle cx="660" cy="220" r="6" fill="#FF7A50"/>
    <circle cx="560" cy="260" r="6" fill="#FF7A50"/>
    <circle cx="480" cy="300" r="6" fill="#FF7A50"/>
    <circle cx="700" cy="320" r="6" fill="#FF7A50"/>

    <g stroke="#FF7A50" stroke-width="1.2" opacity="0.35" fill="none">
      <circle cx="500" cy="150" r="20"/>
      <circle cx="500" cy="150" r="34"/>
      <circle cx="600" cy="120" r="18"/>
      <circle cx="660" cy="220" r="22"/>
      <circle cx="560" cy="260" r="20"/>
      <circle cx="480" cy="300" r="18"/>
      <circle cx="700" cy="320" r="20"/>
    </g>
    <g stroke="#4a2f24" stroke-width="1.4" stroke-dasharray="3 4" opacity="0.7">
      <line x1="500" y1="150" x2="600" y2="120"/>
      <line x1="600" y1="120" x2="660" y2="220"/>
      <line x1="660" y1="220" x2="560" y2="260"/>
      <line x1="560" y1="260" x2="480" y2="300"/>
      <line x1="480" y1="300" x2="700" y2="320"/>
      <line x1="560" y1="260" x2="700" y2="320"/>
    </g>
  </g>

  <text x="210" y="360" font-family="JetBrains Mono, monospace" font-size="13" fill="#7FBF3D" text-anchor="middle" letter-spacing="2">VERKABELT</text>
  <text x="590" y="360" font-family="JetBrains Mono, monospace" font-size="13" fill="#FF7A50" text-anchor="middle" letter-spacing="2">FUNKBASIERT</text>
</svg>
