<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luftstrom-Diagramm eines Lüftungsgeräts mit Wärmerückgewinnung">
  <rect width="800" height="420" fill="#0B120F"/>

  <!-- central heat exchanger unit -->
  <rect x="330" y="150" width="140" height="120" rx="10" fill="#121C18" stroke="#24352C" stroke-width="2"/>
  <g stroke="#24352C" stroke-width="1.5">
    <line x1="350" y1="150" x2="350" y2="270"/>
    <line x1="380" y1="150" x2="380" y2="270"/>
    <line x1="410" y1="150" x2="410" y2="270"/>
    <line x1="440" y1="150" x2="440" y2="270"/>
  </g>
  <circle cx="400" cy="210" r="6" fill="#B7FF5C"/>

  <!-- incoming cold fresh air (left, warm accent turning cool) -->
  <path d="M40,150 C 150,150 220,150 330,175" stroke="#64766B" stroke-width="3" fill="none"/>
  <path d="M330,175 L322,169 M330,175 L322,181" stroke="#64766B" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- outgoing warmed fresh air (right, accent green = efficient) -->
  <path d="M470,175 C 560,150 650,150 760,150" stroke="#B7FF5C" stroke-width="3" fill="none"/>
  <path d="M760,150 L752,144 M760,150 L752,156" stroke="#B7FF5C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- incoming warm exhaust air (top right into unit, warm) -->
  <path d="M760,270 C 650,270 560,270 470,245" stroke="#FF7A50" stroke-width="3" fill="none"/>
  <path d="M470,245 L478,239 M470,245 L478,251" stroke="#FF7A50" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- outgoing cooled stale air (left, dim) -->
  <path d="M330,245 C 220,270 150,270 40,270" stroke="#4a5a50" stroke-width="3" fill="none"/>
  <path d="M40,270 L48,264 M40,270 L48,276" stroke="#4a5a50" stroke-width="3" fill="none" stroke-linecap="round"/>

  <text x="90" y="130" font-family="JetBrains Mono, monospace" font-size="12" fill="#64766B">FRISCHLUFT</text>
  <text x="620" y="130" font-family="JetBrains Mono, monospace" font-size="12" fill="#7FBF3D">ZULUFT +</text>
  <text x="620" y="300" font-family="JetBrains Mono, monospace" font-size="12" fill="#FF7A50">ABLUFT</text>
  <text x="40" y="300" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a5a50">FORTLUFT</text>

  <text x="400" y="215" font-family="JetBrains Mono, monospace" font-size="11" fill="#93A399" text-anchor="middle">WRG</text>
</svg>
